name: Auto Blog

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Article
        env:
          VENICE_KEY: ${{ secrets.VENICE_API_KEY }}
        run: |
        mkdir-p_posts
          curl -X POST https://api.venice.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $VENICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.3-70b","messages":[{"role":"user","content":"Write a 300-word article about AI and human future, with philosophical depth"}]}' \
            > article.json
          
          cat article.json | jq -r '.choices[0].message.content' > _posts/$(date +%Y-%m-%d)-auto.md
          
          git config user.name "Bot"
          git config user.email "bot@theseus.com"
          git add .
          git commit -m "Auto article $(date)"
          git push

